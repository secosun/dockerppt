# ============================================
# AI PPT 统一部署栈 (精简版)
# 架构：OpenClaw Gateway (纯网关) + 外部 LangGraph 推理引擎 + Presenton 渲染
# ============================================
#
# 快速启动:
#   cp .env.example .env
#   docker compose up -d
#
# 查看日志:
#   docker compose logs -f
#
# 停止服务:
#   docker compose down
#
# 组件说明:
#   - redis: 共享 Redis (Presenton RQ, 缓存, 任务状态)
#   - docling-service: Presenton 文档解析服务
#   - presenton: PPT 渲染引擎 (:5000)
#   - ppt-langgraph: PPT 多智能体推理引擎 (API:8000 + Worker)
#   - openclaw-gateway: OpenClaw 网关 (:18789)
#
# 架构设计:
#   ✅ Gateway 仅作为纯 API 网关，不运行任何 Agent 推理
#   ✅ 所有 PPT 生成通过 ppt-langgraph 外部 LangGraph API 调用
#   ✅ ppt-orchestrator 已从 Gateway 内嵌 Agent 中永久移除
#
# ============================================

version: "3.8"

networks:
  aippt-internal:
    driver: bridge
    internal: false

volumes:
  # Presenton
  presenton-redis-data:
    driver: local
  presenton-app-data:
    driver: local
  # OpenClaw
  openclaw-gateway-config:
    driver: local
  openclaw-agent-state:
    driver: local
  openclaw-workspace:
    driver: local
  # PPT LangGraph
  ppt-outputs:
    driver: local

services:
  # ============================================
  # 共享 Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: aippt-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - presenton-redis-data:/data
    networks:
      - aippt-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Presenton - Docling 文档解析服务
  # ============================================
  docling-service:
    image: presenton_docling-service:latest
    container_name: aippt-docling
    networks:
      - aippt-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Presenton - PPT 渲染引擎
  # ============================================
  presenton:
    build:
      context: ./presenton
      dockerfile: Dockerfile
      args:
        INSTALL_OLLAMA: "false"
    container_name: aippt-presenton
    ports:
      - "${PRESENTON_PORT:-5000}:80"
      - "1455:1455"  # Codex OAuth
      - "8001:8001"  # MCP Server
    volumes:
      - presenton-app-data:/app_data
    # 修复：创建 presentation-templates 符号链接，解决模板搜索 API 500 错误
    command: sh -c "ln -sf /app/servers/nextjs/app/presentation-templates /app/servers/nextjs/presentation-templates && node /app/start.js"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 基础配置
      - MIGRATE_DATABASE_ON_STARTUP=true
      - DOCLING_SERVICE_URL=http://docling-service:8001
      - CAN_CHANGE_KEYS=${CAN_CHANGE_KEYS:-}
      # Redis (共享)
      - PRESENTON_REDIS_URL=redis://redis:6379/0
      - PRESENTON_MATERIALIZE_QUEUE=${PRESENTON_MATERIALIZE_QUEUE:-presenton-materialize}
      - PRESENTON_MATERIALIZE_JOB_TIMEOUT=${PRESENTON_MATERIALIZE_JOB_TIMEOUT:-1800}
      - PRESENTON_START_RQ_WORKER=${PRESENTON_START_RQ_WORKER:-true}
      # LLM 配置
      - LLM=${LLM:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-ark-3f4d15de-f1b0-4ac5-a2e9-60a877642a4a-b60f8}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_MODEL=${GOOGLE_MODEL:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.3.142:11450}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - CUSTOM_LLM_URL=${CUSTOM_LLM_URL:-}
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY:-}
      - CUSTOM_MODEL=${CUSTOM_MODEL:-}
      # 功能开关
      - CODEX_MODEL=${CODEX_MODEL:-}
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      - EXTENDED_REASONING=${EXTENDED_REASONING:-}
      - TOOL_CALLS=${TOOL_CALLS:-}
      - DISABLE_THINKING=${DISABLE_THINKING:-}
      - WEB_GROUNDING=${WEB_GROUNDING:-}
      - DISABLE_ANONYMOUS_TRACKING=${DISABLE_ANONYMOUS_TRACKING:-1}
      - COMFYUI_URL=${COMFYUI_URL:-}
      - COMFYUI_WORKFLOW=${COMFYUI_WORKFLOW:-}
      # OpenClaw 网关集成
      - OPENCLAW_GATEWAY_BASE=${OPENCLAW_GATEWAY_BASE:-http://openclaw-gateway:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-secret-key}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE=${NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE:-}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN=${NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN:-}
      - PRESENTON_PUBLIC_EXPORT_BASE=${PRESENTON_PUBLIC_EXPORT_BASE:-}
    depends_on:
      redis:
        condition: service_healthy
      docling-service:
        condition: service_healthy
    networks:
      - aippt-internal
    restart: unless-stopped

  # ============================================
  # PPT LangGraph - 多智能体推理引擎 (API 服务)
  # ============================================
  ppt-langgraph:
    build:
      context: ./peip_inference_interface
      dockerfile: Dockerfile
    container_name: aippt-ppt-langgraph
    ports:
      - "${PPT_LANGGRAPH_PORT:-8000}:8000"
    volumes:
      - ppt-outputs:/app/outputs
      # 开发模式：挂载源代码支持热重载
      - ./peip_inference_interface/src:/app/src:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 核心配置
      - TZ=${TZ:-Asia/Shanghai}
      # 异步任务配置
      - STORAGE_BACKEND=redis  # Redis 分布式任务状态存储（支持跨进程共享）
      - REDIS_URL=redis://redis:6379/0
      - PPT_REDIS_URL=redis://redis:6379/0
      # LLM 路由配置
      - REASONING_PPT_LLM=${REASONING_PPT_LLM:-ollama}
      - PPT_LLM_AGENT_ALLOWLIST=${PPT_LLM_AGENT_ALLOWLIST:-orchestrator,template_selector,outline_planner,data,material_selector,quality_reviewer}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.3.142:11450}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      # Anthropic / 火山
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-ark-3f4d15de-f1b0-4ac5-a2e9-60a877642a4a-b60f8}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-ark-code-latest}
      # 通义千问
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen3.5-plus}
      # 豆包
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - DOUBAO_BASE_URL=${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      - DOUBAO_MODEL=${DOUBAO_MODEL:-doubao-seed-2.0-code}
      # 模型降级路由
      - OPENCLAW_LLM_PRIMARY=${OPENCLAW_LLM_PRIMARY:-anthropic/ark-code-latest}
      - OPENCLAW_LLM_FALLBACKS=${OPENCLAW_LLM_FALLBACKS:-qwen/qwen3.5-plus,doubao/doubao-seed-2.0-code}
      - OPENCLAW_PPT_AGENT_MODELS=${OPENCLAW_PPT_AGENT_MODELS:-}
      # Presenton 集成 (Docker 内网)
      - PRESENTON_API_BASE_URL=http://aippt-presenton:80
      # Presenton 公网地址 (Python 后端用于将内网地址替换为公网地址)
      # 见 peip_inference_interface/docs/PRESENTON_DEPLOYMENT_GUIDE.md §URL 自动替换机制
      - PRESENTON_PUBLIC_BASE_URL=${PRESENTON_PUBLIC_BASE_URL:-https://ppt.installall.cn}
      - PRESENTON_TEMPLATE_SEARCH_PATH=${PRESENTON_TEMPLATE_SEARCH_PATH:-/api/v1/nextjs/templates}
      - PRESENTON_TEMPLATE_SEARCH_METHOD=GET
      - PRESENTON_TEMPLATE_SCHEMA_PATH=${PRESENTON_TEMPLATE_SCHEMA_PATH:-/api/v1/nextjs/template?group={templateKey}}
      - PRESENTON_TEMPLATE_SCHEMA_METHOD=GET
      - PRESENTON_ASSET_SEARCH_PATH=${PRESENTON_ASSET_SEARCH_PATH:-/api/v1/assets/search}
      - PRESENTON_ASSET_SEARCH_METHOD=GET
      - PRESENTON_MATERIALIZE_MODE=${PRESENTON_MATERIALIZE_MODE:-auto}
      - PPT_PRESENTON_MODE=${PPT_PRESENTON_MODE:-remote}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aippt-internal
    restart: unless-stopped

  # ============================================
  # PPT LangGraph - RQ Worker (异步任务执行)
  # ============================================
  ppt-worker:
    build:
      context: ./peip_inference_interface
      dockerfile: Dockerfile
    container_name: aippt-ppt-worker
    volumes:
      - ppt-outputs:/app/outputs
      # 开发模式：挂载源代码支持热重载
      - ./peip_inference_interface/src:/app/src:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 核心配置
      - TZ=${TZ:-Asia/Shanghai}
      # 异步任务配置
      - STORAGE_BACKEND=redis  # Redis 分布式任务状态存储
      - REDIS_URL=redis://redis:6379/0
      - PPT_REDIS_URL=redis://redis:6379/0
      # LLM 路由配置
      - REASONING_PPT_LLM=${REASONING_PPT_LLM:-ollama}
      - PPT_LLM_AGENT_ALLOWLIST=${PPT_LLM_AGENT_ALLOWLIST:-orchestrator,template_selector,outline_planner,data,material_selector,quality_reviewer}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.3.142:11450}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      # Anthropic / 火山
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-ark-3f4d15de-f1b0-4ac5-a2e9-60a877642a4a-b60f8}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-ark-code-latest}
      # 通义千问
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen3.5-plus}
      # 豆包
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - DOUBAO_BASE_URL=${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      - DOUBAO_MODEL=${DOUBAO_MODEL:-doubao-seed-2.0-code}
      # 模型降级路由
      - OPENCLAW_LLM_PRIMARY=${OPENCLAW_LLM_PRIMARY:-anthropic/ark-code-latest}
      - OPENCLAW_LLM_FALLBACKS=${OPENCLAW_LLM_FALLBACKS:-qwen/qwen3.5-plus,doubao/doubao-seed-2.0-code}
      - OPENCLAW_PPT_AGENT_MODELS=${OPENCLAW_PPT_AGENT_MODELS:-}
      # Presenton 集成 (Docker 内网)
      - PRESENTON_API_BASE_URL=http://aippt-presenton:80
      # Presenton 公网地址 (Python 后端用于将内网地址替换为公网地址)
      # 见 peip_inference_interface/docs/PRESENTON_DEPLOYMENT_GUIDE.md §URL 自动替换机制
      - PRESENTON_PUBLIC_BASE_URL=${PRESENTON_PUBLIC_BASE_URL:-https://ppt.installall.cn}
      - PRESENTON_TEMPLATE_SEARCH_PATH=${PRESENTON_TEMPLATE_SEARCH_PATH:-/api/v1/nextjs/templates}
      - PRESENTON_TEMPLATE_SEARCH_METHOD=GET
      - PRESENTON_TEMPLATE_SCHEMA_PATH=${PRESENTON_TEMPLATE_SCHEMA_PATH:-/api/v1/nextjs/template?group={templateKey}}
      - PRESENTON_TEMPLATE_SCHEMA_METHOD=GET
      - PRESENTON_ASSET_SEARCH_PATH=${PRESENTON_ASSET_SEARCH_PATH:-/api/v1/assets/search}
      - PRESENTON_ASSET_SEARCH_METHOD=GET
      - PRESENTON_MATERIALIZE_MODE=${PRESENTON_MATERIALIZE_MODE:-auto}
      - PPT_PRESENTON_MODE=${PPT_PRESENTON_MODE:-remote}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aippt-internal
    restart: unless-stopped
    # Worker 健康检查：查询 Redis 中活跃的 worker
    healthcheck:
      test: ["CMD", "python", "-c", "from redis import Redis; r = Redis(host='redis'); assert len(r.smembers('rq:workers')) > 0, 'no active workers'; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    # 启动 RQ Worker 监听队列
    command: ["python", "-c", "from reasoning.ppt.services.queue import start_worker; start_worker()"]

  # ============================================
  # OpenClaw - Gateway 网关
  # ============================================
  openclaw-gateway:
    build:
      context: ./openclawcluster
      dockerfile: Dockerfile.gateway
    image: openclaw-gateway:latest
    container_name: aippt-gateway
    hostname: openclaw-gateway
    networks:
      - aippt-internal
    ports:
      - "${OPENCLAW_GATEWAY_HOST_PORT:-18789}:18789"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${TZ:-Asia/Shanghai}
      # 网关基础配置
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-secret-key}
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_GATEWAY_PORT: 18789
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: 1
      # 完全禁用内嵌 Agent 推理，所有 Agent 调用委托到外部 LangGraph 执行器
      OPENCLAW_GATEWAY_EMBEDDED_AGENT_DISABLED: 1
      OPENCLAW_GATEWAY_ALLOW_EMBEDDED_HTTP_INGRESS: 0
      OPENCLAW_GATEWAY_SEED_WEIXIN_IF_MISSING: ${OPENCLAW_GATEWAY_SEED_WEIXIN_IF_MISSING:-1}
      # 禁用 Gateway 内嵌 ppt-orchestrator agent 注入
      OPENCLAW_GATEWAY_SEED_PPT_AGENTS: 0
      # Agent 执行器配置
      # 1. 通用远程执行器（同步模式，非 PPT Agent 使用）
      OPENCLAW_AGENT_EXECUTOR_URL: http://aippt-ppt-langgraph:8000/v1/run-agent
      # 2. PPT 专用异步执行器 Base URL（异步模式，提交任务 + 轮询）
      OPENCLAW_PPT_EXECUTOR_BASE_URL: http://aippt-ppt-langgraph:8000
      # 共用配置
      OPENCLAW_AGENT_EXECUTOR_TOKEN: ${OPENCLAW_AGENT_EXECUTOR_TOKEN:-openclaw-distributed-secret-key}
      OPENCLAW_AGENT_EXECUTOR_TIMEOUT_MS: ${OPENCLAW_AGENT_EXECUTOR_TIMEOUT_MS:-1200000}
      # LLM API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-ark-3f4d15de-f1b0-4ac5-a2e9-60a877642a4a-b60f8}
      OPENAI_BASE_URL: https://ark.cn-beijing.volces.com/api/coding
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-ark-3f4d15de-f1b0-4ac5-a2e9-60a877642a4a-b60f8}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
    volumes:
      - openclaw-gateway-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    user: "0"
    init: true
    restart: unless-stopped
    command:
      [
        "gateway",
        "--allow-unconfigured",
        "--bind", "lan",
        "--port", "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
